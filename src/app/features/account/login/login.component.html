<div class="login-page">
  <div class="login-card">

    <!-- En-tête -->
    <div class="login-header">
      <img src="assets/images/logo.png" alt="ElFatoora" class="login-logo" />
      <h1 class="login-title" translate="login.title"></h1>
    </div>

    <!-- Alerte d'erreur -->
    @if (authenticationError()) {
      <div class="alert-danger">
        <strong translate="global.error"></strong> {{ errorMessage() }}
      </div>
    }

    <!-- Formulaire -->
    <form (keyup.enter)="login()">

      <!-- Username -->
      <div class="form-group">
        <label for="username" translate="global.form.username"></label>
        <div class="input-icon">
          <i class="fa fa-user"></i>
          <input
            type="text"
            class="form-control"
            id="username"
            name="username"
            [(ngModel)]="username"
            [disabled]="isLoading()"
            autofocus
            required
            translate="global.form.username"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password" translate="global.form.password"></label>
        <div class="input-icon">
          <i class="fa fa-lock"></i>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            [(ngModel)]="password"
            [disabled]="isLoading()"
            required
          />
        </div>
      </div>

      <!-- Captcha -->
      <div class="form-group">
        <label translate="login.captcha"></label>
        <div class="captcha-group">
          <div class="captcha-row">
            <img
              [src]="captchaUrl"
              id="captcha_id"
              alt="captcha"
              class="captcha-img"
              (click)="refreshCaptcha()"
              [title]="'login.captcha.click' | translate"
            />
            <input
              type="text"
              class="form-control captcha-input"
              [(ngModel)]="captcha"
              name="captcha"
              [placeholder]="'login.captcha.placeholder' | translate"
              [disabled]="isLoading()"
              required
            />
            <button
              type="button"
              class="btn-refresh"
              (click)="refreshCaptcha()"
              [disabled]="isLoading()"
              [title]="'login.captcha.refresh' | translate"
            >
              <i class="fa fa-refresh"></i>
            </button>
          </div>
          <small translate="login.captcha.hint"></small>
        </div>
      </div>

      <!-- Remember me -->
      <div class="remember-me">
        <input
          type="checkbox"
          class="form-check-input"
          id="rememberMe"
          [(ngModel)]="rememberMe"
          name="rememberMe"
          [disabled]="isLoading()"
        />
        <label class="form-check-label" for="rememberMe" translate="login.form.rememberme"></label>
      </div>

      <!-- Bouton connexion -->
      <button
        type="button"
        class="btn-login"
        [disabled]="isLoading()"
        (click)="login()"
      >
        @if (isLoading()) {
          <i class="fa fa-spinner"></i>
          <span translate="global.loading"></span>
        } @else {
          <i class="fa fa-sign-in"></i>
          <span translate="login.form.button"></span>
        }
      </button>

    </form>

    <!-- Liens -->
    <div class="login-links">
      <a [routerLink]="['/reset/request']" translate="login.password.forgot"></a>
      <span class="separator">|</span>
      <span translate="global.messages.info.register.noaccount"></span>
      <a [routerLink]="['/register']" translate="global.messages.info.register.link"></a>
    </div>

  </div>
</div>

<!-- Dialog authentification par carte (ROLE_SUPER_USER) -->
@if (showCardDialog() && cardCredentials) {
  <app-login-card-dialog
    [credentials]="cardCredentials"
    (success)="onCardSuccess()"
    (cancel)="onCardCancel()"
  />
}
